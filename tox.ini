############################################

# tox.ini

# Tox automates testing, linting and type checking

############################################

[tox]

# Python versions where tests will run

envlist = python3.7, python3.8, python3.9

############################################

[gh-actions]

# GitHub Actions CI mapping

# When running on GitHub, use these Python versions

python =
3.7: python3.7
3.8: python3.8
3.9: python3.9

############################################

[testenv]

# Install development dependencies

deps =
-rrequirements_dev.txt

# Commands executed when tox runs

commands =

```
# Stop build if there are Python syntax errors
python -m py_compile src/**/*.py

# Check for critical linting errors
flake8 src --count --select=E9,F63,F7,F82 --show-source --statistics

# Check code complexity and line length
flake8 src --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

# Run static type checking
mypy src/

# Run unit tests
pytest -v tests/unit

# Run integration tests
pytest -v tests/integration

